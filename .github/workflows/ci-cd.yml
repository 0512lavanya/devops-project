name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      run: |
        pytest tests/

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker Image
      run: |
        docker build -t lifestream-app .
        
    # Simulated Deployment to Render
    # In a real scenario, you would trigger a Render Deploy Hook here
    # Example:
    # - name: Trigger Render Deploy
    #   run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    
    - name: Deployment Simulation Success
      run: echo "Docker Image built successfully. Ready for deployment."
