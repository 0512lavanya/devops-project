<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blood | VitalDrop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <nav class="container nav-bar">
            <div class="logo">
                <span class="logo-icon">💧</span> VitalDrop
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('main.index') }}">Home</a></li>
                <li><a href="{{ url_for('main.dashboard') }}">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main class="container fade-in form-page">
        <div class="form-container glass-card">
            <h2>Patient Blood Request</h2>
            <p>Submit a request for blood on behalf of a patient.</p>
            <form action="{{ url_for('main.request_blood') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="patient_name">Patient Name</label>
                    <input type="text" id="patient_name" name="patient_name" class="form-input" required placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="doctor_reference">Doctor Reference</label>
                    <input type="text" id="doctor_reference" name="doctor_reference" class="form-input" required placeholder="Dr. Smith (Oncology)">
                </div>
                <div class="form-group">
                    <label for="blood_type">Blood Type Needed</label>
                    <select id="blood_type" name="blood_type" class="form-input" required>
                        <option value="">Select Blood Type</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="urgency">Urgency</label>
                    <select id="urgency" name="urgency" class="form-input" required>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High" class="text-danger">High (Urgent)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="hospital">Hospital / Location</label>
                    <select id="hospital" name="hospital" class="form-input" required>
                        <option value="">Select Hospital</option>
                        <option value="City General Hospital">City General Hospital</option>
                        <option value="Mercy Medical Center">Mercy Medical Center</option>
                        <option value="St. Jude's Care">St. Jude's Care</option>
                        <option value="Oakwood Healthcare">Oakwood Healthcare</option>
                        <option value="Central Regional Hospital">Central Regional Hospital</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary full-width">Submit Request</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 VitalDrop</p>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
