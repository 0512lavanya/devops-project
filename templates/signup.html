<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | VitalDrop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="glass-header">
        <nav class="container nav-bar">
            <div class="logo">
                <span class="logo-icon">💧</span> VitalDrop
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('main.index') }}">Home</a></li>
                <li><a href="{{ url_for('main.login') }}" class="btn-primary-outline">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container fade-in form-page">
        <div class="form-container glass-card">
            <h2>Create an Account</h2>
            <p>Join the VitalDrop network.</p>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form action="{{ url_for('main.signup') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="blood_type">Your Blood Type</label>
                    <select id="blood_type" name="blood_type" class="form-input" required>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="location">Location / City</label>
                    <input type="text" id="location" name="location" class="form-input" required>
                </div>
                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role" name="role" class="form-input" required>
                        <option value="donor">Individual Donor</option>
                        <option value="hospital">Hospital / Medical Center</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary full-width">Sign Up</button>
            </form>
        </div>
    </main>
</body>
</html>
